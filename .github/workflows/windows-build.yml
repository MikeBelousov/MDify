name: Windows Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "windows/**"
      - "workers/**"
      - ".github/workflows/windows-build.yml"
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Windows artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
            "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "APP_VERSION=0.1.${{ github.run_number }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            workers/lite/requirements-lite.txt
            workers/ocr/requirements-ocr.txt

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('windows/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache OCR models
        uses: actions/cache@v4
        with:
          path: workers/ocr/models
          key: ocr-models-${{ hashFiles('workers/ocr/model_manifest.json') }}

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Restore Windows solution
        run: dotnet restore windows/MDify.Windows.sln

      - name: Test Windows solution
        run: dotnet test windows/MDify.Windows.sln -c Release --no-restore

      - name: Install worker test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r workers/ocr/requirements-ocr.txt
          python -m pip install pytest

      - name: Test Python workers
        shell: pwsh
        run: |
          python -m pytest workers/tests/test_lite_worker.py -q
          python -m pytest workers/tests/test_ocr_worker.py -q
          python -m pytest workers/tests/test_windows_worker_build_script.py -q

      - name: Build lite worker
        shell: pwsh
        run: ./workers/build/build_worker_windows.ps1 -Variant lite -Python python

      - name: Build OCR worker
        shell: pwsh
        run: ./workers/build/build_worker_windows.ps1 -Variant ocr -Python python

      - name: Publish Windows app
        shell: pwsh
        run: |
          dotnet publish windows/MDify.Windows/MDify.Windows.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o dist/windows/app

      - name: Copy workers and notices
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows/app/Workers | Out-Null
          Copy-Item -Recurse -Force .build/workers/win-x64/mdify-worker-lite dist/windows/app/Workers/
          Copy-Item -Recurse -Force .build/workers/win-x64/mdify-worker-ocr dist/windows/app/Workers/
          Copy-Item -Force LICENSE dist/windows/app/
          Copy-Item -Force ThirdPartyNotices.md dist/windows/app/

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$env:APP_VERSION" windows/installer/MDify.iss

      - name: Create portable zip
        shell: pwsh
        run: Compress-Archive -Path dist/windows/app/* -DestinationPath dist/windows/MDify-Windows-Portable.zip -Force

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: MDifySetup
          path: dist/windows/installer/MDifySetup.exe

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: MDify-Windows-Portable
          path: dist/windows/MDify-Windows-Portable.zip
